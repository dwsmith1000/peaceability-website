backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/peaceability-website
  branch: main
  auth_endpoint: /api/auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

i18n:
  structure: multiple_files
  locales: [en, fr]
  default_locale: en

collections:
  - name: "news"
    label: "News & Events"
    label_singular: "News Item"
    folder: "src/content/{{locale}}/news"
    create: true
    i18n: true
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text", i18n: true }
    
  - name: "resources"
    label: "Resources"
    label_singular: "Resource"
    folder: "src/content/{{locale}}/resources"
    create: true
    i18n: true
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Description", name: "description", widget: "text", i18n: true }
      - { label: "Link (optional)", name: "link", widget: "string", required: false }

